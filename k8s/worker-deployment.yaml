apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: shoppulse
  labels:
    app: worker
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: shoppulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: worker
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -p 5432 -U shoppulse; do sleep 2; done"]
        - name: wait-servicebus
          image: curlimages/curl:8.5.0
          command: ["sh", "-c", "until curl -sf http://servicebus-emulator:8080/health; do sleep 5; done"]
      containers:
        - name: worker
          image: shoppulseacr.azurecr.io/worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8001
          envFrom:
            - secretRef:
                name: shoppulse-app
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
